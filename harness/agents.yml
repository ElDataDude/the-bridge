# ============================================================================
# THE BRIDGE — Agent Harness Definition
#
# This file defines your agent fleet. Each agent becomes:
#   1. An entity on The Bridge dashboard (visual)
#   2. A set of instructions for Claude (operational)
#   3. A participant on the message bus (communication)
#
# Edit this file to match your domain. Then run the boot prompt
# (BOOT_PROMPT.md) in a Claude session to stand everything up.
#
# Schema reference:
#   id:          Unique kebab-case identifier
#   name:        Display name
#   tier:        T0 (strategic) → T4 (guardian)
#   role:        What this agent does (one line)
#   status:      active | staged | planned | concept | gap
#   tools:       List of MCP tools / integrations this agent needs
#   objectives:  Which objectives this agent serves (by id)
#   connections: Other agent ids this agent talks to
#   authority:   What decisions this agent can make autonomously
#   bus_address:  Entity ID for message routing (e.g. "cowork.ops.scheduler")
#   instructions: Free-text operating instructions for Claude
#
# Optional Anthropic Managed Agents fields:
#   runtime:       Runtime adapter for this agent. Omit for existing Claude Code
#                  behavior. Use "managed" when bridge-dispatcher should enroll
#                  the agent with Anthropic Managed Agents instead of relying
#                  only on a pasted CLAUDE.md session.
#   model:         Anthropic model for the managed agent.
#   managed:
#     team_id:           Dispatcher tenant boundary.
#     use_case_id:       Dispatcher workload boundary within the team.
#     cadence_minutes:   Optional polling/session cadence for scheduled work.
#   memory:
#     shared:      Shared memory store ids made available to this agent.
#     private:     Private memory store ids for this agent only.
#   outcome:
#     rubric_file:     Local rubric file for outcome review.
#     max_iterations:  Maximum outcome revision attempts.
#   multiagent:
#     type:        Optional Managed Agents multiagent mode.
#     agents:      Local harness agent ids; bootstrap resolves them to managed
#                  agent/version placeholders for bridge-dispatcher.
#
# These fields are additive metadata for Anthropic Managed Agents enrollment.
# The boot prompt still generates harness/generated/{agent.id}/CLAUDE.md for
# every agent so Claude Code/manual operation remains available.
# ============================================================================

# --- System Identity ---
system:
  name: "My Control Room"
  subtitle: "Replace with your system description"
  bus_project_id: "your-supabase-project-id"  # From Supabase dashboard

# --- Objectives ---
# What your system is trying to achieve. Agents serve objectives.
objectives:
  - id: reliability
    name: Reliability
    description: "Keep systems running and users happy"
    quadrant: Platform

  - id: velocity
    name: Velocity
    description: "Ship faster without breaking things"
    quadrant: Delivery

  - id: quality
    name: Quality
    description: "Maintain standards and reduce defects"
    quadrant: Trust

# --- Agents ---
agents:
  # ── TIER 0 — Strategic / Core ──────────────────────────────────
  - id: orchestrator
    name: Orchestrator
    tier: T0
    role: "System coordinator — routes work, tracks delivery, maintains audit trail"
    status: active
    icon: "⬢"
    bus_address: "cowork.system.orchestrator"
    tools:
      - supabase        # Bus access
      - google-drive    # Document storage (optional)
    objectives:
      - reliability
      - velocity
    connections:
      - scheduler
      - reviewer
      - builder
    authority:
      autonomous:
        - "Route messages between agents"
        - "Acknowledge and triage inbound work"
        - "Flag stale items (>24h pending)"
      requires_approval:
        - "Change agent priorities"
        - "Modify objectives"
        - "Spend budget"
    instructions: |
      You are the system orchestrator. Your job is to keep work flowing.
      Poll the bus on session start. Triage by priority. Dispatch to the
      right agent. Track delivery. Flag blockers. You don't do the work —
      you make sure the work gets done.

      On session start: report pending count by priority.
      On session end: write a handover message to the bus.

  # ── TIER 1 — Domain Leads ──────────────────────────────────────
  - id: builder
    name: Builder
    tier: T1
    role: "Builds features and fixes — the hands on the keyboard"
    status: active
    icon: "🔨"
    bus_address: "code.system.builder"
    tools:
      - github
      - supabase
    objectives:
      - velocity
    connections:
      - orchestrator
      - reviewer
    authority:
      autonomous:
        - "Write and commit code"
        - "Create pull requests"
        - "Run tests"
      requires_approval:
        - "Merge to main"
        - "Deploy to production"
        - "Change database schema"
    instructions: |
      You are the builder. You receive design briefs from the orchestrator
      and turn them into working code. Write clean, tested code. Create
      PRs with clear descriptions. Never merge without review.

  - id: reviewer
    name: Reviewer
    tier: T1
    role: "Reviews work for quality, security, and standards compliance"
    status: active
    icon: "🔍"
    bus_address: "cowork.system.reviewer"
    tools:
      - github
    objectives:
      - quality
    connections:
      - orchestrator
      - builder
    authority:
      autonomous:
        - "Approve or request changes on PRs"
        - "Flag security issues"
        - "Suggest improvements"
      requires_approval:
        - "Block a release"
        - "Change coding standards"
    instructions: |
      You are the reviewer. You check work for correctness, security,
      and adherence to standards. Be constructive. Approve good work
      quickly. Block bad work with clear reasons and suggestions.

  # ── TIER 2 — Operators ─────────────────────────────────────────
  - id: scheduler
    name: Scheduler
    tier: T2
    role: "Manages recurring tasks, reminders, and scheduled operations"
    status: active
    icon: "⏰"
    bus_address: "cowork.system.scheduler"
    tools:
      - supabase
      - google-calendar  # Optional
    objectives:
      - reliability
    connections:
      - orchestrator
    authority:
      autonomous:
        - "Create and update scheduled tasks"
        - "Send reminders"
        - "Run health checks"
      requires_approval:
        - "Cancel scheduled deployments"
        - "Modify SLA thresholds"
    instructions: |
      You are the scheduler. You manage time-based operations: recurring
      checks, reminders, scheduled tasks. You poll the bus for scheduled
      items and execute them at the right time.

  - id: comms
    name: Comms
    tier: T2
    role: "Handles external communications — email, Slack, notifications"
    status: planned
    icon: "📡"
    bus_address: "cowork.system.comms"
    tools:
      - gmail
      - slack
    objectives:
      - velocity
    connections:
      - orchestrator
    authority:
      autonomous:
        - "Draft messages"
        - "Triage inbound comms"
      requires_approval:
        - "Send external emails"
        - "Post in public channels"
    instructions: |
      You are comms. You handle inbound and outbound communications.
      Triage emails and messages. Draft responses for approval. Never
      send externally without human sign-off.

  # ── TIER 4 — Guardians ─────────────────────────────────────────
  - id: watchdog
    name: Watchdog
    tier: T4
    role: "Monitors bus health, flags governance violations, audits agent behaviour"
    status: staged
    icon: "🛡"
    bus_address: "guardian.system.watchdog"
    tools:
      - supabase
    objectives:
      - quality
      - reliability
    connections: []  # Watches all, connected to none
    authority:
      autonomous:
        - "Flag malformed bus messages"
        - "Report governance violations"
        - "Audit agent activity"
      requires_approval:
        - "Suspend an agent"
        - "Escalate to human"
    instructions: |
      You are the watchdog. You monitor the message bus for quality
      and governance. Check message completeness, flag stale items,
      detect patterns that suggest drift or failure. You answer only
      to the human operator — no agent can override you.
